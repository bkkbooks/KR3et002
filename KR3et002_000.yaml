front:
  text: 原序獄事莫重於大辟大辟莫重於初情初情莫重於檢驗蓋死生出入之權輿幽枉屈伸之機括於是乎決法中所以通著今佐理據者謹之至也年來州縣悉以委之初官付之右選更歷未深驟然嘗試重以仵作之欺僞吏胥之奸巧虛幻變化茫不可詰縱有敏者一心兩目亦無所用其智而況遙望而弗親掩鼻而不屑者哉慈四叨臬寄他無寸長獨於獄案審之又審不敢萌一毫慢易心若灼然知其為欺則亟與駁下或疑信未決必反下覆深思惟恐率然而行死者虛被潦漉每念獄情之失多起於發端之著定驗之誤皆原於歷試之涉遂博採近世所傳諸書自內恕録以下凡數家會而粹之釐而正之增以己見總為一編名曰洗冤集録刊於湖南憲治示我同寅使得參驗互考如醫師討論古法脈絡表裡先已洞徹一旦按此以施針砭發無不中則其洗冤澤物當與起死回生同一功用矣淳祐丁未嘉平節前十日朝散大夫新除直祕閣湖南提刑充大使行府參議官宋慈惠父序賢士大夫或有得於見聞及親所歷涉出於此集之外者切望片紙録賜以廣未備慈拜稟
