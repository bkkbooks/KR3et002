body:
  text: 卷之二五疑難雜說下有檢驗被殺尸在路旁始疑盜者殺之及點檢沿身衣物俱在遍身鐮刀砍傷十餘處檢官曰盜只欲人死取財今物在傷多非冤仇而何遂屏左右呼其妻問曰汝夫自來與甚人有冤仇最深應曰夫自來與人無冤仇只近日有某甲來做債不得曾有剋期之言然非冤仇深者檢官默識其居遂多差人分頭告示側近居民各家所有鐮刀盡底將來只今呈驗如有隱藏必是殺人賊當行根勘俄而居民齎到鐮刀七八十張令布列地上時方盛暑內鐮刀一張蠅子飛集檢官指此鐮刀問為誰者忽有一人承當乃是做債剋期之人就擒訊問猶不伏檢官指刀令自看衆人鐮刀無蠅子今汝殺人血腥氣猶在蠅子集聚豈可隱耶左右環視者失聲歎服而殺人者叩首服罪昔有深池中溺死人經久事屬大家因仇事發體究官見皮肉盡無惟髑髏骸骨尚在纍委官不肯驗上司督責至數人獨一官員承當即行就地檢骨先點檢見得其他並無痕跡乃取髑髏淨洗將淨熱湯瓶細細斟湯灌從腦門穴入看有無細泥沙屑自鼻竅中出以此定是與不是生前溺水身死蓋生前落水則因鼻息取氣吸入沙土死後則無廣右有凶徒謀死小童行而奪其所齎發覺距行凶日已遠囚已招伏打奪就推入水中尉司打撈已得尸於下流肉已潰盡僅留骸骨不可辨驗終未免疑其假合未敢處斷後因閲案卷見初檢體究官繳到血屬所供稱其弟原是龜胸而矮小遂差官覆驗其胸果然方敢定刑南方之民每有小小爭競便自盡其命而謀賴人者多矣先以櫸樹皮罨成痕損死後如他物所傷何以驗之但看其痕裡面須深墨色四邊青赤散成一痕而無虛腫者即是生前以櫸樹皮罨成也蓋人生即血脈流行與櫸相扶而成痕若以手按著痕損處虛腫即非櫸皮所罨也若死後以櫸皮罨者即苦無散遠青赤色只微有黑色而按之不緊硬者其痕為死後罨之也蓋人死後血脈不行致櫸不能施其效更在審詳原情尸首痕損那邊長短能合他物大小臨時裁之必無疏誤凡有死尸肥壯無痕損不黃瘦不得作病患死又有尸首無痕損只是黃瘦亦不得據所見只作病患死檢了切須仔細驗定因何致死唯此等檢驗最誤人也凡疑難檢驗及兩爭之家稍有勢力須選慣熟仵作人有行止畏謹守分貼司並隨馬行飲食水火令人監之少休以待其來不如是則私請行矣假使驗得甚實吏或受賂其事亦變官吏獲罪猶庶幾變動事情枉致人命事實重焉應檢驗死人諸處傷損並無不是病狀難為定驗者先須勒下骨肉次第等人狀訖然後剃除死人髮髻恐生前被人將刃物釘入囟門或腦中殺害性命被殘害死者須檢齒舌耳鼻內或手足指甲中有簽刺算害之類凡檢驗尸首指定作被打後服毒身死及被打後自縊身死被打後投水身死之類最須見得親切方可如此申上世間多有打死人後以藥灌入口中誣以自服毒藥者亦有死後用繩吊起假作生前自縊者亦有死後推入水中假作自投水者一有差互利害不小今須仔細點檢死人在身傷痕如果不是要害致命去處其自縊投水及自服毒皆有可憑實跡方可保明六初檢告狀切不可信須是詳細檢驗務要從實有可任公吏使之察訪或有非理等說且聽來報自更裁度戒左右人不得鹵莽初檢不得稱尸首壞爛不任檢驗並須指定要害致死之因凡初檢時如體問得是爭鬥分明雖經多日亦不得定作無憑檢驗招上司問難須仔細定當痕損致命去處若委是經日久變動方稱尸首不任擺撥初檢尸有無傷損訖就驗處襯簟尸首在物上復以物蓋候畢周圍用灰印記有若干枚交與守尸弓手耆正副鄰人看守責狀附案交與覆檢免至被人殘害傷損尸首也若是疑難檢驗仍不得遠去防覆檢異同七覆檢與前檢無異方可保明具申萬一致命處不明痕損不同如以藥死作病死之類不可概舉前檢受弊覆檢者烏可不究心察之恐有連纍矣檢得與前驗些小不同遷就改正果有大段違戾不可依隨更再三審問干係等人如衆稱可變方據檢得異同事理供申不可據己見便變易覆檢如尸經多日頭面肨脹皮發脫落唇口翻張兩眼迭出蛆蟲咂食委實壞爛不通措手若系刃傷他物拳手足踢痕虛處方可作無憑覆檢狀申如是他物及刃傷骨損宜沖洗仔細驗之即須於狀內聲說致命豈可作無憑檢驗申上覆檢官驗訖如無爭論方可給尸與親屬無親屬者責付本都埋瘞勒令看守不得火化及散落如有爭論未可給尸且掘一坑就所簟物𢱲尸安頓坑內上以門扇蓋用土罨瘞作堆周圍用灰印印記防備後來官司再檢覆仍責看守狀附案八驗尸身上件數正頭面有無髻子髮長若干頂心囟門髮際額兩眉兩眼或開或閉如閉擘開驗眼睛全與不全鼻兩鼻孔口或開或閉齒舌如自縊舌有無抵齒頦喉胸兩乳婦人兩奶膀心腹臍小肚玉莖陰囊次後捻兩腎子全與不全婦人言産門女子言陰門兩腳大腿膝兩腳臁韌兩腳腕兩腳面十指爪翻身腦後乘枕項兩胛背腰兩臀瓣有無杖痕穀道後腿兩曲䐐兩腿肚兩腳跟兩腳板左側左頂下腦角太陽穴耳面臉頸肩膊肘腕臂手五指爪全與不全或拳或不拳曲腋脅肋胯外膝外臁韌腳踝右側亦如之四縫尸首須躬親看驗頂心囟門兩額角兩太陽喉下胸前兩乳兩脅肋心腹腦後乘枕陰囊穀道並系要害致命之處婦人看陰門兩奶膀於內若一處有痕損在要害或非致命即令仵作指定喝起衆約死人年幾歲臨時須仔細看顏貌供寫或問血屬尤真凡檢尸先令多燒蒼朮皂角方詣尸前檢畢約三五步令人將醋潑炭火上行從上過其穢氣自然去矣多備蔥椒鹽白梅防其痕損不見處藉以擁罨仍帶一砂盆並捶研上件物凡檢覆須在專一不可避臭惡切不可令仵作行人遮閉玉莖産門之類大有所誤仍仔細驗頭髮內穀道産門內慮有鐵釘或他物在內檢出致命要害處方可押兩爭及知見親屬令見切不可容令近前恐損害尸體被傷處須仔細量長闊深淺小大定致死之由仵作行人受囑多以芮一作茜草投醋內塗傷損處痕皆不見以甘草汁解之則見人身本赤黑色死後變動作青膒色其痕未見有可疑處先將水灑濕後將蔥白拍碎令開塗痕處以醋蘸紙蓋上候一時久除去以水洗其痕即見若尸上有數處青黑將水滴放青黑處是痕則硬水住不流不是痕處軟滴水便流去驗尸併骨傷損處痕跡未見用糟醋潑罨尸首於露天以新油絹或明油雨傘覆欲見處迎日隔傘看痕即見若陰雨以熱炭隔照此良法也或更隱而難見以白梅搗爛攤在欲見處再擁罨看猶未全見再以白梅取肉加蔥椒鹽糟一處研拍作餅子火上煨令極熱烙損處下先用紙襯之即見其損昔有二人鬥毆俄頃一人仆地氣絶見證分明及驗出尸乃無痕損檢官甚撓時方寒忽思得計遂令掘一坑深二尺余依尸長短以柴燒熱得所置尸坑內以衣物覆之良久覺尸溫出尸以酒醋潑紙貼則致命痕傷遂出擁罨檢訖仵作行人喝四縫尸首謂尸仰臥自頭喝頂心囟門全額全兩額角全兩太陽全兩眼兩眉兩耳兩腮兩肩並全胸心臍腹全陰腎全婦人云産門全女人云陰門全兩髀腰膝兩臁韌兩腳面十指爪並全左手臂肘腕並指甲全左肋並脅全左腰胯及左腿腳並全右亦如之翻轉尸腦後乘枕全兩耳後髮際連項全兩背胛連脊全兩腰眼兩臀並穀道全兩腿兩後䐐兩腿肚兩腳跟兩腳心並全九婦人凡驗婦人不可羞避若是處女札四至訖𢱲出光明平穩處先令坐婆剪去中指甲用綿札先勒死人母親及血屬並鄰婦二三人同看驗是與不是處女令坐婆以所剪甲指頭入陰門內有黯血出是無即非若婦人有胎孕不明致死者勒坐婆驗腹內委實有無胎孕如有孕心下至肚臍以手拍之堅如鐵石無即軟若無身孕又無痕損勒坐婆定驗産門內恐有他物有孕婦人被殺或因産子不下身死尸經埋地窖至檢時卻有死孩兒推詳其故蓋尸埋頓地窖因地水火風吹死人尸首脹滿骨節縫開故逐出腹內胎孕孩子亦有臍帶之類皆在尸腳下産門有血水惡物流出若富人家女使先量死處四至了便扛出大路上檢驗有無痕損令衆人見以避嫌疑附小兒尸並胞胎有因爭鬥因而殺子謀人者將子手足捉定用腳跟於喉下踏死只令仵作行人以手按其喉必塌可驗真僞凡定當小兒骸骨即云十二三歲小兒若駁問如何不定是男是女即解云某當初只指定十二三歲小兒即不曾說是男是女蓋律稱兒不定作兒是男女也墮胎者准律未成形像杖一百墮胎者徒三年律云墮謂打而落謂胎子落者按五藏神論懷胎一月如白露二月如桃花三月男女分四月形像具五月筋骨成六月毛髮生七月動右手是男於母左八月動左手是女於母右九月三轉身十月滿足若驗得未成形像只驗所墮胎作血肉一片或一塊若經日壞爛多化為水若所墮胎已成形像者謂頭腦口眼耳鼻手腳指甲等全者亦有臍帶之類令收生婆定驗月數定成人形或未成形責狀在案墮胎兒在母腹內被驚後死胎下者衣胞紫黑色血蔭軟弱生下腹外死者其尸淡紅赤無紫黑色及胞衣白十四時變動春三月尸經兩三日口鼻肚皮兩脅胸前肉色微青經十日則鼻耳內有惡汁流出肨匹縫切脹臭也脹肥人如此久患瘦劣人半月後方有此證夏三月尸經一兩日先從面上肚皮兩脅胸前肉色變動經三日口鼻內汁流蛆出遍身肨脹口唇翻皮膚脫爛疱疹起經四五日發落暑月罨尸損處浮皮多白不損處卻青黑不見的實痕設若避臭穢據見在檢過往往誤事稍或疑處浮皮須令剝去如有傷損底下血廕分明更有暑月九竅內未有蛆蟲卻於太陽穴髮際內兩脅腹內先有蛆出必此處有損秋三月尸經二三日亦先從面上肚皮兩脅胸前肉色變動經四五日口鼻內汁流蛆出遍身肨脹口唇翻疱疹起經六七日發落冬三月尸經四五日身體肉色黃緊微變經半月以後先從面上口鼻兩脅胸前變動或按在濕地用薦席裹角埋瘞著其尸卒難變動更詳月頭月尾按春秋節氣定之盛熱尸首經一日即皮肉變動作青黯色有氣息經三四日皮肉漸壞尸脹蛆出口鼻汁流頭髮漸落盛寒五日如盛熱一日時半月如盛熱三四日時春秋氣候平和兩三日可比夏一日八九日可比夏三四日然人有肥瘦老少肥少者易壞瘦老者難壞又南北氣候不同山內寒暄不常更在臨時通變審察十一洗罨宜多備糟醋襯尸紙惟有藤連紙白抄紙可用若竹紙見鹽醋多爛恐侵損尸體𢱲尸於平穩光明地上先檢驗一遍用水沖洗次挼皂角洗滌尸垢膩又以水沖蕩潔淨洗時下用門扇簟席襯不惹塵土洗了如法用糟醋擁罨尸首仍以死人衣物盡蓋用煮醋淋又以薦席罨一時久候尸體透軟即去蓋物以水衝去糟醋方驗不得信行人說只將酒醋潑過痕損不出初春與冬月宜熱煮醋及炒糟令熱仲春與殘秋宜微熱夏秋之內糟醋微熱以天氣炎熱恐傷皮肉秋將深則用熱尸左右手肋相去三四尺加火熁以氣候差涼冬雪寒凜尸首僵凍糟醋雖極熱被衣重疊擁罨亦不得尸體透軟當掘坑長闊於尸深三尺取炭及木柴遍鋪坑內以火燒令通紅多以醋沃之氣勃勃然方連擁罨法物襯簟𢱲尸置於坑內仍用衣被覆蓋再用熱醋淋遍坑兩邊相去二三尺復以火烘約透去火移尸出驗冬殘春初不必掘坑只用火烘兩邊看節候詳度湖南風俗檢死人皆於尸傍開一深坑用火燒紅去火入尸在坑內潑上糟醋又四面用火逼良久扛出尸或行凶人爭痕損或死人骨屬相爭不肯認至於有三四次扛入火坑重檢者人尸至三四次經火肉色皆焦赤痕損愈不分明行吏因此為奸未至一兩月間肉皆潰爛及其家有論訴差到聚檢官時已是數月止有骨殖肉上痕損並不得而知火坑法獨湖南如此守官者宜知之十二驗未埋瘞尸首未埋尸首或在屋內地上或床上或屋前後露天地上或在山嶺溪澗草木上並先打量頓尸所在四至高低所離某處若干在溪澗之內上去山腳或岸幾許系何人地上地名甚處若屋內系在何處及上下有無物色蓋簟訖方可𢱲尸出驗先剝脫在身衣服或婦人首飾自頭上至鞋襪逐一抄札或是隨身行李亦具名件訖且以溫水洗尸一遍了乃驗未要便用酒醋剝爛衣服洗了先看其尸有無軍號或額角面臉上所刺大小字體計幾行或幾字是何軍人若系配隸人所配隸何州軍字亦須計行數如經刺環或方或圓或在手背項上亦計幾個內是刺字或環子曾艾灸或用藥取痕跡黯濫及成疤瘢可取竹削一篦子於灸處撻之可見辨驗色目人訖即看死人身上甚處有雕青有灸瘢系新舊瘡疤有無膿血計共幾個及新舊官杖瘡疤或背或臀並新舊荊杖子痕或腿或腳底甚處有舊瘡癤瘢甚處是見患須量見分寸及何處有黯記之類盡行聲說如無亦開寫打量尸首身長若干髮長若干年顏若干十三驗墳內及屋下攢殯尸先驗墳系何人地上地名甚處土堆一個量高及長闊並各計若干尺寸及尸現攢殯在何人屋下亦如前量之次看尸頭腳所向謂如頭東腳西之類頭離某處若干腳離某處若干左右亦如之對衆爬開浮土或取去攢磚看其尸用何物盛簟謂棺木有無漆飾席有無沿褖及蕟簟之類舁出開拆取尸於光明處地上驗之十四驗壞爛尸若避臭穢不親臨往往誤事尸首變動臭不可近當燒蒼朮皂角闢之用麻油塗鼻或作紙攄子搵油塞兩鼻孔仍以生薑小塊置口內遇檢切用猛閉口恐穢氣衝入量札四至訖用水衝去蛆蟲穢汙皮肉乾淨方可驗未須用糟醋頻令新汲水澆尸首四面尸首壞爛被打或刃傷處痕損皮肉作赤色深重作青黑色貼骨不壞蟲不能食十五無憑檢驗凡檢驗無憑之尸宜說頭髮褪落曲鬢頭面遍身皮肉並皆一概青黑㿹皮壞爛及被蛆蟲咂破骨殖顯露去處如皮肉消化宜說骸骨顯露上下皮肉並皆一概消化只有些小消化不及筋肉與骨殖相連今來委是無憑檢覆本人生前沿身上下有無傷損它故及定奪年顏形狀致死因依不得兼用手揣捏得沿身上下並無骨損去處十六白僵死瘁死先鋪炭火約與死人長闊上鋪薄布可與炭等以水噴微濕臥尸於上仍以布覆蓋頭面肢體訖再用炭火鋪擁令遍再以布覆之復用水遍灑一時久其尸皮肉必軟起乃揭所鋪布與炭看若皮肉軟起方可以熱醋洗之於驗損處以蔥椒鹽同白梅和糟研爛拍作餅子火內煨令熱先於尸上用紙搭了次以糟餅罨之其痕損必見
