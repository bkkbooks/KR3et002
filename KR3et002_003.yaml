body:
  text: 卷之三十七驗骨人有三百六十五節按一年三百六十五日男子骨白婦人骨黑婦人生骨出血如河水故骨黑如服毒藥骨黑須仔細詳定髑髏骨男子自頂及耳並腦後共八片蔡州人有九片腦後橫一縫當正直下至髮際別有一直縫婦人只六片腦後橫一縫當正直下無縫牙有二十四或二十八或三十二或三十六胸前骨三條心骨一片嫩如錢大項與脊骨各十二節自項至腰共二十四椎骨上有一大椎骨肩井及左右飯匙骨各一片左右肋骨男子各十二條八條長四條短婦人各十四條男女腰間各有一骨大如手掌有八孔作四行樣手腳骨各二段男子左右手腕及左右臁韌骨邊皆有捭骨婦人無兩腳膝頭各有𩓹骨隱在其間如大指大手掌腳板各五縫手腳大拇指並腳第五指各二節餘十四指並三節尾蛆骨若豬腰子仰在骨節下男子者其綴脊處凹兩邊皆有尖瓣如稜萎角周布九竅婦人者其綴脊處平直周布六竅大小便處各一竅骸骨各用麻草小索或細篾串訖各以紙簽標號某骨檢驗時不至差誤十八論沿身骨脈及要害去處夫人兩手指甲相連者小節小節之後中節中節之後者本節本節之後肢骨之前生掌骨掌骨上生掌肉掌肉後可屈曲者腕腕左起高骨者手外踝右起高骨者右手踝二踝相連生者臂骨輔臂骨者髀骨三骨相繼者肘骨前可屈曲者曲肘曲肘上生者臑骨臑骨上生者肩髃肩髃之前者橫髃骨橫髃骨之前者髀骨髀骨之中陷者缺盆缺盆之上者頸頸之前者顙喉顙喉之上者結喉結喉之上者頦頦兩傍者曲頷曲頷兩傍者頤頤兩旁者頰車頰車上者耳耳上者曲鬢曲鬢上行者頂頂前者囟門囟門之下者髮際髮際正下者額額下者眉眉際之末者太陽穴太陽穴前者目目兩旁者兩小眥兩小眥上者上臉瞼下者下臉瞼正位能瞻視者目瞳子瞳子近鼻者兩大眥近兩大眥者鼻山根鼻山根上印堂印堂上者腦角腦角下者承枕骨脊骨下橫生者髖骨髖骨兩傍者叉骨叉骨下中者腰門骨叉骨上連生者腿骨腿骨下可屈曲者曲䐐曲䐐上生者膝蓋骨膝蓋骨下生者脛骨脛骨旁生者䯒骨䯒骨下左起高大者兩足外踝右起高大者兩足右踝脛骨前垂者兩足跂骨跂骨前者足本節本節前者小節小節相連者足指甲指甲後生者足前跗跗後凹陷者足心下生者足掌骨掌骨後生者踵肉踵肉後者腳跟也檢滴骨親法謂如某甲是父或母有骸骨在某乙來認親生男或女何以驗之試令某乙就身刺一兩點血滴骸骨上是的親生則血沁入骨內否則不入俗云滴骨親蓋謂此也檢骨須是晴明先以水淨洗骨用麻穿定形骸次第以簟子盛定卻鋤開地窖一穴長五尺闊三尺深二尺多以柴炭燒煅以地紅為度除去火卻以好酒二升酸醋五升潑地窖內乘熱氣扛骨入穴內以藁薦遮定蒸骨一兩時候地冷取去薦扛出骨殖向平明處將紅油傘遮尸骨驗若骨上有被打處即有紅色路微廕骨斷處其接續兩頭各有血暈色再以有痕骨照日看紅活乃是生前被打分明骨上若無血廕蹤有損折乃死後痕切不可以酒醋煮骨恐有不便處此項須是晴明方可陰雨則難見也如陰雨不得已則用煮法以甕一口如鍋煮物以炭火煮醋多入鹽白梅同骨煎須著親臨監視候千百滾取出水洗向日照其痕即見血皆浸骨損處赤色青黑色仍仔細驗有無破裂煮骨不得見錫用則骨多黯若有人作弊將藥物置鍋內其骨有傷處反白不見解法見驗尸門若骨或經三兩次洗罨其色白與無損同何以辨之當將合驗損處骨以油灌之其骨大者有縫小者有竅候油溢出則揩令乾嚮明照損處油到即停住不行明亮處則無損一法濃磨好墨塗骨上候乾即洗去墨若有損處則墨必浸入不損則墨不浸又法用新綿於骨上拂拭遇損處必牽惹綿絲起折者其色在骨斷處兩頭又看折處其骨芒刺向里或外毆打折者芒刺在裡在外者非髑髏骨有他故處骨青骨折處帶瘀血仔細看骨上有青暈或紫黑暈長是他物圓是拳大是頭撞小是腳尖四縫骸骨內一處有損折系致命所在或非要害即令仵作行人指定喝起擁罨檢訖仵作行人喝四縫骸骨謂尸仰臥自髑髏喝頂心至囟門骨鼻梁骨頦頷骨並口骨並全兩眼眶兩額角兩太陽兩耳兩腮頰骨並全兩肩井兩臆骨全胸前龜子骨心坎骨全左臂腕手及髀骨全左肋骨全左胯左腿左臁韌並髀骨及左腳踝骨腳掌骨並全右亦如之翻轉喝腦後乘枕骨脊下至尾蛆骨並全凡驗原被傷殺死人經日尸首壞蛆蟲咂食只存骸骨者原被傷痕血黏骨上有乾黑血為證若無傷骨損其骨上有破損如頭髮露痕又如瓦器龜裂沉淹損路為驗毆死者受傷處不至骨損則肉緊貼在骨上用水沖激亦不去指甲蹙之方脫肉貼處其痕損即可見驗骨訖自髑髏肩井臆骨並臂腕手骨及胯骨腰腿骨臁韌膝蓋並髀骨並標號左右其肋骨共二十四莖左右各十二莖分左右系左第一左第二右第一右第二之類莖莖依資次題訖內脊骨二十四節亦自上題一二三四連尾蛆骨處號之並胸前龜子骨心坎骨亦號之庶易於檢湊兩肩兩胯兩腕皆有蓋骨尋常不繫在骨之數經打傷損方入衆骨係數不若拘收在數為良也先用紙數重包定次用油單紙三四重裹了用索子交眼扎系作三四處封頭印押訖用桶一隻盛之上以板蓋掘坑埋瘞作堆標記仍用灰印行在有一種毒草名曰賤草煎作膏子售人若以染骨其色必變黑黯粗可亂真然被打若在生前打處自有暈痕如無暈而骨不損即不可指以為痕切須仔細辨別真僞十九自縊自縊身死者兩眼合唇口黑皮開露齒若勒喉上即口閉牙關緊舌抵齒不出又云齒微咬舌若勒喉下則口開舌尖出齒門二分至三分面帶紫赤色口吻兩角及胸前有吐涎沫兩手須握大拇指兩腳尖直垂下腿上有血廕如火灸斑痕及肚下至小腹並墜下青黑色大小便自出大腸頭或有一兩點血喉下痕紫赤色或黑淤色直至左右耳後髮際橫長九寸以上至一尺以來一云丈夫合一尺一寸婦人合一尺腳虛則喉下勒深實則淺人肥則勒深瘦則淺用細緊麻繩草索在高處自縊懸頭頓身致死則痕跡深若用全幅勒帛及白練項帕等物又在低處則痕跡淺低處自縊身多臥於下或側或覆側臥其痕斜起橫喉下覆臥其痕正起在喉下起於耳邊多不至腦後髮際下自縊處須高八尺以上兩腳懸虛所踏物須倍高如懸虛處或在床椅火爐船倉內但高二三尺以來亦可自縊而死若經泥雨須看死人赤腳或著鞋其踏上處有無印下腳跡自縊有活套頭死套頭單系十字纏繞系須看死人踏甚物入頭在繩套內須垂得繩套寬入頭方是活套頭腳到地並膝跪地亦可死死套頭腳到地並膝跪地亦可死單系十字懸空方可死腳尖稍到地亦不死單系十字是死人先自用繩帶自系項上後自以手系高處須是先看上頭系處塵土及死人踏甚處物自以手攀系得上向繩頭著方是上面繫繩頭處或高或大手不能攀及不能上則是別人吊起更看所繫處物伸縮須是頭墜下去上頭系處一尺以上方是若是頭緊抵上頭定是別人吊起纏繞系是死人先將繩帶纏繞項上兩遭自踏高系在上面垂身致死或是先繫繩帶在梁棟或樹枝上雙䙡垂下踏高入頭在䙡內更纏過一兩遭其痕成兩路上一路纏過耳後斜入髮際下一路平繞項行吏畏避駁雜必告檢官乞只申一痕切不可信若除了上一痕不成自縊若除下一痕正是致命要害去處或覆檢官不肯相同書填格目血屬有詞再差官覆檢出為之奈何須是據實不可只作一條痕檢其相疊與分開處作兩截量盡取頭了畫取樣子更重將所繫處繩帶纏過比並闊狹並同任從覆檢可無後患凡因患在床仰臥將繩帶等物自縊者則其尸兩眼合兩唇皮開露齒咬舌出一分至二分肉色黃形體瘦兩手拳握臀後有糞出左右手內多是把自縊物色至繫緊死後只在手內須量兩手拳相去幾寸以來喉下痕跡紫赤周圍長一尺余結締在喉下前面分數較深曾被解救則其尸肚脹多口不咬舌臀後無糞若真自縊開掘所縊腳下穴三尺以來究得火炭方是或在屋下自縊先看所縊處楣梁枋桁之類塵土袞亂至多方是如只有一路無塵不是自縊先以杖子於所繫繩索上輕輕敲如緊直乃是或寬慢即是移尸大凡移尸別處吊掛舊痕挪動便有兩痕凡驗自縊之尸先要見得在甚地分甚街巷甚人家何人見本人自用甚物於甚處搭過或作十字死䙡系定或於項下作活䙡套卻驗所著衣新舊打量身四至東西南北至甚物面覷甚處背向甚處其死人用甚物踏上上量頭懸去所吊處相去若干尺寸下量腳下至地相去若干尺寸或所縊處雖低亦看頭上懸掛索處下至所離處並量相去若干尺寸對衆解下扛尸於露明處方解脫自縊套繩通量長若干尺寸量圍喉下套頭繩圍長若干項下交圍量到耳後髮際起處闊狹橫斜長短然後依法檢驗凡驗自縊人先問原申人其身死人是何色目人見時早晚曾與不曾解下救應申官時早晚如有人識認即問自縊人年若干作何經紀家內有甚人卻因何在此間自縊若是奴僕先問雇主討契書辨驗仍看契書上有無親戚年多少更看原吊掛蹤跡去處如曾解下救應即問解下時有氣脈無氣脈解下約多少時死切須仔細大凡檢驗未可便作自縊致命未辨仔細凡有此只可作其人生前用繩索系咽喉下或上要害致命身死以防死人別有枉橫且如有人睡著被人將索勒死吊起所在其檢官如何見得是自縊致死宜仔細也多有人家女使人力或外人於家中自縊其人不曉法避見臭穢及避檢驗遂移尸出外吊掛舊痕移動致有兩痕舊痕紫赤有血廕移動痕只白色無血廕移尸事理甚分明要公行根究開坐生前與死後痕蓋移尸不過杖罪若漏落不具覆檢官不相照應申作兩痕官司必反見疑益重干連人之禍尸首日久壞爛頭吊在上尸側在地肉潰見骨但驗所弔頭其繩若入槽謂兩耳連頷下深向骨本者及驗兩手腕骨頭腦骨皆赤色者是一云齒赤色及十指尖骨赤色者是二十被打勒死假作自縊自縊被人勒殺或算殺假作自縊甚易辨真自縊者用繩索帛之類繫縛處交至左右耳後深紫色眼合唇開手握齒露縊在喉上則舌抵齒喉下則舌多出胸前有涎滴沫臀後有糞出若被人打勒殺假作自縊則口眼開手散發慢喉下血脈不行痕跡淺淡舌不出亦不抵齒項上肉有指爪痕身上別有致命傷損去處惟有生勒未死間即時吊起詐作自縊此稍難辨如跡狀可疑莫若檢作勒殺立限捉賊也凡被人隔物或窗櫺或林木之類勒死僞作自縊則繩不交喉下痕多平過卻極深黑黯色亦不起於耳後髮際絞勒喉下死者結締在死人項後兩手不垂下縱垂下亦不直項後結交卻有背倚柱等處或把衫襟搊著即喉下有衣衫領黑跡是要害處氣悶身死凡檢被勒身死人將項下勒繩索或是諸般帶系臨時仔細聲說纏繞過遭數多是於項後當正或偏左右系定須有系不盡垂頭處其尸合面地臥為被勒時爭命須是揉撲得頭髮或角子散慢或沿身上有搕擦著痕凡被勒身死人須看覷尸身四畔有扎磨蹤跡去處又有死後被人用繩索系扎手腳及項下等處其人已死氣血不行雖被繫縛其痕不紫赤有白痕可驗死後繫縛者無血廕繫縛痕雖深入皮即無青紫赤色但只是白痕有用火篦烙成痕但紅色或焦赤帶濕不幹二十一溺死若生前溺水尸首男僕臥女仰臥頭面仰兩手兩腳俱向前口合眼開閉不定兩手拳握腹肚脹拍著響落水則手開眼微開肚皮微脹投水則手握眼合腹內急脹兩腳底皺白不脹頭髻緊頭與髮際手腳爪縫或腳著鞋則鞋內各有沙泥口鼻內有水沫及有些小淡色血汙或有搕擦損處此是生前溺水之驗也蓋其人未死必須爭命氣脈往來搐水入腸故兩手自然拳曲腳罅縫各有沙泥口鼻有水沫流出腹內有水脹也若檢覆遲即尸首經風日吹曬遍身上皮起或生白疱若身上無痕面色赤此是被人倒提水搵死若尸面色微赤口鼻內有泥水沫肚內有水腹肚微脹真是淹水身死若因病患溺死則不計水之深淺可以致死身上別無它故若疾病身死被人拋掉在水內即口鼻無水沫肚內無水不脹面色微黃肌肉微瘦若因患倒落泥渠內身死者其尸口眼開兩手微握身上衣裳並口鼻耳髮際並有青泥汙者須脫下衣裳用水淋洗酒噴其尸被泥水淹浸處即肉色微白肚皮微脹指甲有泥若被人毆打殺死推在水內入深則脹淺則不甚脹其尸肉色帶黃不白口眼開兩手散頭髮寬慢肚皮不脹口眼耳鼻無水瀝流出指爪罅縫並無沙泥兩手不拳縮兩腳底不皺白卻虛脹身上有要害致命傷損處其痕黑色尸有微瘦臨時看驗若檢得身上有損傷處録其痕跡雖是投水亦合押合幹人赴官司推究諸自投井被人推入井自失腳落井尸首大同小異皆頭目有被磚石磕擦痕指甲毛髮有沙泥腹脹側覆臥之則口內水出別無他故只作落井身死即投井推入在其間矣所謂落井小異者推入與自落井則手開眼微開腰身間或有錢物之類自投井則眼合手握身間無物大凡有故入井須腳直下若頭在下恐被人趕逼或它人推送入井若是失腳須看失腳處土痕自投河被人推入河若水稍深闊則無磕擦沙泥等事若水淺狹亦與投井落井無異大抵水深三四尺皆能淹殺人驗之果無它故只作落水身死則自投推入在其間矣若身有繩索及微有痕損可疑則宜檢作被人謀害置水身死不過立限捉賊切勿恤一捕限而貽罔測之憂諸溺河池行運者謂之河不行運者謂之池檢驗之時先問原申人早晚見尸在水內見時便只在今處或自漂流而來若是漂流而來即問是東西南北又如何流到此便住如何申官如稱見其人落水即問當時曾與不曾救應若曾救應其人未出水時已死或救應上岸才死或即申官或經幾時申官若在江河陂潭池塘間難以打量四至只看尸所浮在何處如未浮打撈方出聲說在何處打撈見尸池塘或坎阱有水處可以致命者須量見淺深丈尺坎阱則量四至江河陂潭尸起浮或見處地岸並池塘坎阱系何人所管地名何處諸溺井之人檢驗之時亦先問原申人如何知得井內有人初見有人時其人死未既知未死因何不與救應其尸未浮如何知得井內有人若是屋下之井即問身死人自從早晚不見卻如何知在井內凡井內有人其井內自然先有水沫以此為驗量井之四至系何人地上其地名甚處若溺尸在底則不必量但約深若干丈尺方摝尸出尸在井內滿脹則浮出尺余水淺則不出若出看頭或腳在上在下先量尺寸不出亦以丈竿量到尸近邊尺寸亦看頭或腳在上在下檢溺死之尸水浸多日尸首肨脹難以顯見致死之因宜申說頭髮脫落頭目肨脹唇口番張頭面連遍身上下皮血並皆一概青黑褪皮驗是本人在井或河內死後水浸經隔日數致有此今來無憑檢驗本人沿身有無傷損它故又定奪年顏形狀不得只檢得本人口鼻內有沫腹脹驗得前件尸首委是某處水溺身死其水浸更多日無憑檢驗即不用申說致命因依初春雪寒經數日方浮與春夏秋末不侔凡溺死之人若是人家奴婢或妻女未落水先已曾被打在身有傷今次又的然見得是自落水或投井身死于格目內亦須分明具出傷痕定作被打復溺水身死投井死人如不曾與人交爭驗尸時面目頭額有利刃痕又依舊帶血似生前痕此須看井內有破瓷器之屬以致傷著人初入井時氣尚未絶其痕依舊帶血若驗作生前刃傷豈不利害
