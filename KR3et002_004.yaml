body:
  text: 卷之四二十二驗他物及手足傷死律云見血為傷非手足者其餘皆為他物即兵不用刃亦是傷損條限手足十日他物二十日鬥訟敕諸齧人者依他物法元符敕申明刑統以靴鞋踢人傷從官司驗定堅硬即從他物若不堅硬即難作他物例或額肘膝拶頭撞致死並作他物傷痕諸他物是鐵鞭尺斧頭刀背木杆棒馬鞭木柴磚石瓦粗布鞋衲底鞋皮鞋草鞋之類若被打死者其尸口眼開髮髻亂衣服不齊整兩手不拳或有溺汙內衣若在辜限外死須驗傷處是與不是在頭及因破傷風灌注致命身死應驗他物及手足毆傷痕損須在頭面上胸前兩乳脅肋傍臍腹間大小便二處方可作要害致命去處手足折損亦可死其痕周匝有血廕方是生前打損諸用他物及頭額拳手腳足堅硬之物撞打痕損顏色其至重者紫黯微腫次重者紫赤微腫又其次紫赤色又其次青色其出限外痕損者其色微青凡他物打著其痕即斜長或橫長如拳手打著即方圓如腳足踢比如拳手寸手分寸較大凡傷痕大小定作掌拳足他物當以上件物比定方可言分寸凡打著兩日身死分寸稍大毒氣蓄積向里可約得一兩日後身死若是打著當下身死則分寸深重毒氣紫黑即時向里可以當下身死諸以身去就物謂之磕雖著無破處其痕方圓雖破亦不至深其被他物及手足傷皮雖傷而血不出者其傷痕處有紫赤暈凡行凶人若用棒杖等行打則多先在實處其被傷人或經一兩時辰或一兩日或三五日以至七八日十餘日身死又有用堅硬他物行打便致身死者更看痕迹輕重若是先驅捽被傷人頭髻然後散拳踢打則多在虛怯要害處或一拳一腳便致命若因腳踢著要害處致命切要仔細驗認行凶人腳上有無鞋履防日後問難凡他物傷若在頭腦者其皮不破即須骨肉損也若在其他虛處即臨時看驗若是尸首左邊損即是凶身行右物致打順故也若是右邊損即損處在近後若在右前即非也若在後即又慮凶身自後行他物致打貴在審之無失看其痕大小量見分寸又看幾處皆可致命只指一重害處定作虛怯要害致命身死打傷處皮膜相離以手按之即響以熱醋罨罨之則有痕凡被打傷殺死人須定最是要害處致命身死若打折腳手限內或限外死時要詳打傷分寸闊狹後定是將養不較致命身死面顏歲數臨時聲説凡驗他物及拳踢痕細認斜長方圓皮有微損未洗尸前用水灑濕先將蔥白搗爛塗後以醋糟候一時除以水洗痕即出若將櫸木皮罨成痕假作他物痕其痕內爛損黑色四圍青色聚成一片而無虛腫捺不堅硬又有假作打死將青竹篦火燒烙之卻只有焦黑痕又淺而光平更不堅硬二十三自刑凡自割喉下死者其尸口眼合兩手拳握臂曲而縮死人用手把定刃物似作力勢其手自然拳握肉色黃頭髻緊若用小刀子自割只可長一寸五分至二寸用食刀即長三寸至四寸以來若用瓷器分數不大逐件器刃自割並下刃一頭尖小但傷著氣喉即死若將刃物自斡著喉下心前腹上兩脅肋太陽頂門要害處但傷著膜分數雖小即便死如割斡不深及不繫要害雖三兩處未得致死若用左手刃必起自右耳後過喉一二寸用右手必起自左耳後傷在喉骨上難死蓋喉骨堅也在喉骨下易死蓋喉骨下虛而易斷也其痕起手重收手輕假如用左手把刃而傷則喉右邊下手處深左邊收刃處淺其中間不如右邊蓋下刃太重漸漸負痛縮手因而輕淺及左手須似握物是也右手亦然凡自割喉下只是一出刀痕若當下身死時痕深一寸七分食系氣系並斷如傷一日以下身死深一寸五分食系斷氣系微破如傷三五日以後死者深一寸三分食系斷須頭髻角子散慢更看其人面愁而眉皺即是自割之狀此亦難必若自用刀剁下手並指節者其皮頭皆齊必用藥物封扎雖是刃物自傷必不能當下身死必是將養不較致死其痕肉皮頭卷向里如死後傷者即皮不卷向里以此為驗又有人因自用口齒咬下手指者齒內有風著於痕口多致身死少有生者其咬破處瘡口一道周迥骨折必有膿水淹浸皮肉損爛因此將養不較致命身死其痕有口齒迹及有皮血不齊去處驗自刑人即先問原申人其身死人是何色目人自刑時或早或晚用何刃物若有人來認識即問身死人年若干在生之日使左手使右手如是奴婢即先討契書看更問有無親戚及已死人使左手使右手並須仔細看驗痕迹去處更須看驗在生前刃傷即有血行死後即無血行二十四殺傷凡被人殺傷死者其尸口眼開頭髻寬或亂兩手微握所被傷處要害分數較大皮肉多卷凸若透膜腸臟必出其被傷人見行凶人用刃物來傷之時必須爭競用手來遮截手上必有傷損或有來護者亦必背上有傷著處若行凶人於虛怯要害處一刃直致命者死人手上無傷其瘡必重若行凶人用刃物斫著腦上頂門腦角後髮際必須斫斷頭髮如用刀剪者若頭頂骨折即是尖物刺著須用手捏著其骨損與不損若尖刃斧痕上闊長內必狹大刀痕淺必狹深必闊刀傷處其痕兩頭尖小無起手收手輕重槍刺痕淺則狹深必透竿其痕帶圓或只用竹槍尖竹擔斡著要害處瘡口多不齊整其痕方圓不等凡驗被快利物傷死者須看原著衣衫有無破傷處隱對痕血點可驗又如刀剔傷腸肚出者其被傷處須有刀刃撩劃三兩痕且一刀所傷如何卻有三兩痕蓋凡人腸臟盤在左右脅下是以撩划著三兩痕凡檢刀槍刃斫剔須開説尸在甚處向當著甚衣服上有無血迹傷處長闊深分寸透肉不透肉或腸肚出膋膜出作致命處仍檢刃傷衣服穿孔如被竹槍尖物剔傷致命便説尖硬物剔傷致死凡驗殺傷先看是與不是刀刃等物及生前死後痕傷如生前被刃傷其痕肉闊花文交出若肉痕齊截只是死後假作刃傷痕如生前刃傷即有血汁及所傷痕瘡口皮肉血多花鮮色所損透膜即死若死後用刀刃割傷處肉色即乾白更無血花也蓋人死後血脈不行是以肉色白也此條仍責取行人定驗是與不是生前死後傷痕活人被刃殺傷死者其被刃處皮肉緊縮有血廕四畔若被支解者筋骨皮肉稠黏受刃處皮肉緊縮骨露死人被割截尸首皮肉如舊血不灌廕被割處皮不緊縮刃盡處無血流其色白蹤痕下有血洗檢擠捺肉內無清血出即非生前被刃更有截下頭者活時斬下筋縮入死後截下項長並不伸縮凡檢驗被殺身死尸首如是尖刃物方説被刺要害若是齊頭刃物即不説刺字如被傷著肚上兩肋下或臍下説長闊分寸後便説斜深透內脂膜肚腸出有血汙驗是要害被傷割處致命身死若是傷著心前肋上只説斜深透內有血汙驗是要害致命身死如傷著喉下説深至項鎖骨損兼周迥所割得有方圓不齊去處食系氣系並斷有血汙致命身死可説要害處如傷著頭面上或太陽穴腦角後髮際內如行凶人刃物大方説骨損若腦漿出時有血汙亦定作要害處致命身死如斫或刺著沿身不拘那裡若經隔數日後身死便説將養不較致命身死凡驗被殺傷人未到驗所先問原申人曾與不曾收捉得行凶人是何色目人使是何刃物曾與不曾收得刃物如收得取索看大小著紙畫樣如不曾收得則問刃物在甚處亦令原申人畫刃物樣畫訖令原申人於樣下書押字更問原申人其行凶人與被傷人是與不是親戚有無冤仇二十五尸首異處凡驗尸首異處勒家屬先辨認尸首務要仔細打量尸首頓處四至訖次量首級離尸遠近或左或右或去肩腳若干尺寸支解手臂腳腿各量別計仍各寫相去尸遠近卻隨其所解肢體與尸相湊提捧首與項相湊圍量分寸一般系刃物斫落若項下皮肉卷凸兩肩井聳皮𤿫系生前斫落皮肉不卷凸兩肩井不聳𤿫系死後斫落二十六火死凡生前被火燒死者其尸口鼻內有煙灰兩手腳皆拳縮緣其人未死前被火逼奔掙口開氣脈往來故呼吸煙灰入口鼻內若死後燒者其人雖手足拳縮口內即無煙灰若不燒著兩肘骨及膝骨手腳亦不拳縮若因老病失火燒死其尸肉色焦黑或卷兩手拳曲臂曲在胸前兩膝亦曲口眼開或咬齒及唇或有脂膏黃色突出皮肉若被人勒死拋掉在火內頭髮焦黃頭面渾身燒得焦黑皮肉搐皺並無掩漿㿹皮去處項下有被勒著處痕迹又若被刀殺死卻作火燒死者勒仵作拾起白骨扇去地下灰塵於尸首下淨地上用釅米醋酒潑若是殺死即有血入地鮮紅色須先問尸首生前宿臥所在卻恐殺死後移尸往他處即難驗尸下血色大凡人屋或瓦或茅蓋若被火燒其死尸在茅瓦之下或因與人有仇乘勢推入燒死者其死尸則在茅瓦之上兼驗頭足亦有向至如尸被火化盡只是灰無條段骨殖者勒行人鄰證供狀緣上件尸首或失火燒燬或被人燒燬即無骸骨存在委是無憑檢驗方與備申凡驗被火燒死人先問原申人火從何處起火起時其人在甚處因甚在彼被火燒時曾與不曾救應仍根究曾與不曾與人作鬧見得端的方可檢驗或檢得頭髮焦拳頭面連身一概焦黑宜申説今來無憑檢驗本人沿身上下有無傷損他故及定奪年顏形狀不得只檢得本人口鼻內有無灰燼委是火燒身死如火燒深重實無可憑即不要説口鼻內灰燼二十七湯潑死凡被熱湯潑傷者其尸皮肉皆拆皮脫白色著肉者亦白肉多爛赤如在湯火內多是倒臥傷在手足頭面胸前如因鬥打或頭撞腳踏手推在湯火內多是兩後䐐與臀腿上或有打損處其疱不甚起與其他所燙不同二十八服毒凡服毒死者尸口眼多開面紫黯或青色唇紫黑手足指甲俱青黯口眼耳鼻間有血出甚者遍身黑腫面作青黑色唇捲髮疱舌縮或裂拆爛腫微出唇亦爛腫或裂拆指甲尖黑喉腹脹作黑色生疱身或青斑眼突口鼻眼內出紫黑血鬚髮浮不堪洗未死前須吐出惡物或瀉下黑血穀道腫突或大腸穿出有空腹服毒惟腹肚青脹而唇指甲不青者亦有食飽後服毒惟唇指甲青而腹肚不青者又有腹臟虛弱老病之人略服毒而便死腹肚口唇指甲並不青者卻須參以他證生前中毒而遍身作青黑多日皮肉尚有亦作黑色若經久皮肉腐爛見骨其骨黲黑色死後將毒藥在口內假作中毒皮肉與骨只作黃白色凡服毒死或時即發作或當日早晚若其藥慢即有一日或二日發或有翻吐或吐不絶仍須於衣服上尋余藥及死尸坐處尋藥物器皿之類中蟲毒遍身上下頭面胸心並深青黑色肚脹或口內吐血或糞門內瀉血鼠莽草毒江南有之亦類中蟲加之唇裂齒齦青黑色此毒經一宿一日方見九竅有血出食果實金石藥毒者其尸上下或有一二處赤腫有類拳手傷痕或成大片青黑色爪甲黑身體肉縫微有血或腹脹或瀉血酒毒腹脹或吐瀉血砒霜野葛毒得一伏時遍身發小疱作青黑色眼睛聳出舌上生小刺疱綻出口唇破裂兩耳脹大腹肚膨脹糞門脹綻十指甲青黑金蠶蠱毒死尸瘦劣遍身黃白色眼睛塌口齒露出上下唇縮腹肚塌將銀叉驗作黃浪色用皂角水洗不去一云如是隻身體脹皮肉似湯火疱起漸次為膿舌頭唇鼻皆破裂乃是中金蠶蠱毒之狀手腳指甲及身上青黑色口鼻內多出血皮肉多裂舌與糞門皆露出乃是中藥毒菌菌毒之狀如因吐瀉瘦弱皮膚微黑不破裂口內無血與糞門不出乃是飲酒相反之狀若驗服毒用銀叉皂角水揩洗過探入死人喉內以紙密封良久取出作青黑色再用皂角水揩洗其色不去如無其色鮮白如服毒中毒死人生前吃物壓下入腸臟內試驗無證即自穀道內試其色即見凡檢驗毒死尸間有服毒已久蘊積在內試驗不出者須先以銀或銅叉探入死人喉訖卻用熱糟醋自下罨洗漸漸向上須令氣透其毒氣熏蒸黑色始現如便將熱糟醋自上而下則其毒氣逼熱氣向下不復可見或就糞門上試探則用糟醋當反是又一法用大米或占黏米三升炊飯用淨糯米一升淘洗了用布袱盛就所炊飯上炊饙取雞子一個鴨子亦可打破取白拌糯米飯令勻依前袱起著在前大米占黏米飯上以手三指緊握糯米飯如鴨子大毋令冷急開尸口齒外放著及用小紙三五張搭遮尸口耳鼻臀陰門之處仍用新綿絮三五條釅醋三五升用猛火煎數沸將綿絮放醋鍋內煮半時取出仍用糟盤罨尸卻將綿絮蓋覆若是死人生前被毒其尸即腫脹口內黑臭惡汁噴來綿絮上不可近後除去綿絮糯米飯被臭惡之汁亦黑色而臭此是受毒藥之狀如無則非也試驗糯米飯封起申官府之時分明開説此檢驗訣曾經大理寺看定廣南人小有爭怒賴人自服胡蔓草一名斷腸草形如阿魏葉長尖條蔓生服三葉以上即死乾者或收藏經久作末食亦死如方食未久將大糞汁灌之可解其草近人則葉動將嫩葉心浸水涓滴入口即百竅潰血其法急取抱卵不生雞兒細研和麻油開口灌之乃盡吐出惡物而蘇如少遲無可救者二十九病死凡因病死者形體羸瘦肉色痿黃口眼多合腹肚多陷兩眼通黃兩拳微握髮髻解脫身上或有新舊針灸瘢痕余無他故即是因病死凡病患求乞在路死者形體瘦劣肉色痿黃口眼合兩手微握口齒焦黃唇不著齒邪魔中風卒死尸多肥肉色微黃口眼合頭髻緊口內有涎沫遍身無他故卒死肌肉不陷口鼻內有涎沫面色紫赤蓋其人未死時涎壅於上氣不宣通故面色及口鼻如此卒中死眼開睛白口齒開牙關緊間有口眼喎斜並口兩角鼻內涎沫流出手腳拳曲中暗風尸必肥肉多滉白色口眼皆閉涎唾流溢卒死於邪祟其尸不在於肥瘦兩手皆握手足爪甲多青或暗風如發驚搐死者口眼多喎斜手足必拳縮臂腿手足細小涎沫亦流以上三項大略相似更須檢時仔細分別傷寒死遍身紫赤色口眼開有紫汗流唇亦微綻手不握拳時氣死者眼開口開遍身黃色量有薄皮起手足俱伸中暑死多在五六七月眼合舌與糞門俱不出面黃白色凍死者面色痿黃口內有涎沫牙齒硬身直兩手緊抱胸前兼衣服單薄檢時用酒醋洗得少熱氣則兩腮紅面如芙蓉色口有涎沫出其涎不黏此則凍死證飢餓死者渾身黑瘦硬直眼閉口開牙關緊禁手腳俱伸或疾病死值春夏秋初申得遲經隔兩三日肚上臍下兩脅肋骨縫有微青色此是病人死後經日變動腹內穢汙發作攻注皮膚致有此色不是生前有他故切宜仔細凡驗病死之人才至檢所先問原申人其身死人來自何處幾時到來幾時得病曾與不曾申官取責口詞有無人識認如收得口詞即須問原患是何疾病年多少病得幾日方申官取問口詞既得口詞之後幾日身死如無口詞則問如何取口詞不得若是奴婢則須先討契書看問有無親戚患是何病曾請是何醫人吃甚藥曾與不曾申官取口詞如無則問不責口詞因依然後對衆證定如別無它故只取衆定驗狀稱説遍身黃色骨瘦委是生前因患是何疾致死仍取醫人定驗疾色狀一紙如委的衆證因病身死分明原初雖不曾取責口詞但不是非理致死不須牒請覆驗三十針灸死須勾醫人驗針灸處是與不是穴道雖無意致殺亦須説顯是針灸殺亦可科醫不應為罪三十一札口詞凡抄札口詞恐非正身或以它人偽作病狀代其飾説一時不可辨認合於所判狀內云日後或死亡申官從條檢驗庶使豪強之家預知所警
