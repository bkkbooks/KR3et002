body:
  text: 卷之五三十二驗罪囚死凡驗諸處獄內非理致死囚人須當徑申提刑司即時入發𮞏鋪三十三受杖死定所受杖處瘡痕闊狹看陰囊及婦人陰門並兩脅肋腰小腹等處有無血廕痕小杖痕左邊橫長三寸闊二寸五分右邊橫長三寸五分闊三寸各深三分大杖痕左右各方圓三寸至三寸五分各深三分各有膿水兼瘡周回亦有膿水淹浸皮肉潰爛去處背上杖瘡橫長五寸闊三寸深五分如日淺時宜說兼瘡周回有毒氣攻注青赤㿹皮緊硬去處如日數多時宜說兼瘡周回亦有膿水淹浸皮肉潰爛去處將養不較致命身死又有訊腿杖而荊杖侵及外腎而死者尤須細驗三十四跌死凡從樹及屋臨高跌死者看枝柯掛𢯌所在並屋高低失腳處蹤跡或土痕高下及要害處須有抵隱或物擦磕痕瘢若內損致命痕者口眼耳鼻內定有血出若傷重分明更當仔細驗之仍量撲落處高低丈尺三十五塌壓死凡被塌壓死者兩腿𤿫出舌亦出兩手微握遍身死血淤紫黯色或鼻有血或清水出傷處有血廕赤腫皮破處四畔赤腫或骨並筋皮斷折須壓著要害致命如不壓著要害不致死死後壓即無此狀凡檢舍屋及牆倒石頭脫落壓著身死人其尸沿身虛怯要害去處若有痕損須說長闊分寸作堅硬物壓痕仍看骨損與不損若樹木壓死要見得所倒樹木斜傷著痕損分寸三十六外物壓塞口鼻死凡被人以衣服或濕紙搭口鼻死則腹干脹若被人以外物壓塞口鼻出氣不得後命絶死者眼開睛突口鼻內流出清血水滿面血廕赤黑色糞門突出及便溺汙壞衣服三十七硬物癮痁死凡被外物癮痁死者肋後有癮痁著紫赤腫方圓三寸四寸以來皮不破用手揣捏得筋肋骨傷損此最為虛怯要害致命去處三十八牛馬踏死凡被馬踏死者尸色微黃兩手散頭髮不慢口鼻中多有血出痕黑色被踏要害處便死骨折腸臟出若只築倒或踏不著要害處即有皮破癮赤黑痕不致死驢足痕小牛角觸著若皮不破傷亦赤腫觸著處多在心頭胸前或在小腹脅肋亦不可拘三十九車輪拶死凡被車輪拶死者其肉色微黃口眼開兩手微握頭髻緊凡車輪頭拶著處多在心頭胸前並兩脅肋要害處便死不是要害不致死四十雷震死凡被雷震死者其尸肉色焦黃渾身軟黑兩手拳散口開眼𤿫耳後髮際焦黃頭髻披散燒著處皮肉緊硬而攣縮身上衣服被天火燒爛或不火燒傷損痕跡多在腦上及腦後腦縫多開鬢髮如焰火燒著從上至下時有手掌大片浮皮紫赤肉不損胸項背膊上或有似篆文痕四十一虎咬死凡被虎咬死者尸肉色黃口眼多開兩手拳握髮髻散亂糞出傷處多不齊整有舌舐齒咬痕跡虎咬人多咬頭項上身上有爪痕𢯌損痕傷處成窟或見骨心頭胸前臂腿上有傷處地上有虎跡勒畫匠畫出虎跡並勒村甲及傷人處鄰人供責為證一云虎咬人月初咬頭項月中咬腹背月盡咬兩腳貓兒咬鼠亦然四十二蛇蟲傷死凡被蛇蟲傷致死者其被傷處微有齧損黑痕四畔青腫有青黃水流毒氣灌注四肢身體光腫面黑如檢此狀即須定作毒氣灌著甚處致死四十三酒食醉飽死凡驗酒食醉飽致死者先集會首等對衆勒仵作行人用醋湯洗檢在身如無痕損以手拍死人肚皮膨脹而響者如此即是因酒食醉飽過度腹脹滿心肺致死仍取本家親的骨肉供狀述死人生前常吃酒多少致醉及取會首等狀今來吃酒多少數目以驗致死因依四十四醉飽後築踏內損死凡人吃酒食至飽被築踏內損亦可致死其狀甚難明其尸外別無他故唯口鼻糞門有飲食並糞帶血流出遇此形狀須仔細體究曾與人交爭因而築踏見人照證分明方可定死狀四十五男子作過死凡男子作過太多精氣耗盡脫死於婦人身上者真僞不可不察真則陽不衰僞者則痿四十六遺路死或是被打死者扛在路旁耆正只申官作遺路死尸須是仔細如有痕跡合申官多方體訪四十七死後仰臥停泊有微赤色凡死人項後背上兩肋後腰腿內兩臂上兩腿後兩曲䐐兩腳肚子上下有微赤色驗是本人身死後一向仰臥停泊血脈墜下致有此微赤色即不是別緻他故身死四十八死後蟲鼠犬傷凡人死後被蟲鼠傷即皮破無血破處周回有蟲鼠齧痕蹤跡有皮肉不齊去處若狗咬則痕跡粗大四十九發冢驗是甚向墳圍長闊多少被賊人開鋤墳土狼藉鍬鋤開深尺寸見板或開棺見尸勒所報人具出死人原裝著衣服物色有甚不見被賊人偷去五十驗鄰縣尸凡鄰縣有尸在山林荒僻處經久損壞無皮肉本縣已作病死檢了卻牒鄰縣覆蓋為他前檢不明於心未安相攀覆檢有如此類莫若據直申其尸見有白骨一副手足頭全並無皮肉腸胃驗是尸經多日即不見得因何致死所有尸骨未敢給付埋殯申所屬施行不可被公人紿作無憑檢驗凡被牒往他縣覆檢者先具承牒時辰起離前去事狀申所屬官司值夜止宿及到地頭次第取責干連人罪狀致死今經幾日方行檢驗如經停日久委的皮肉壞爛不任看驗者即具仵作行人等衆狀稱尸首頭項口眼耳鼻咽喉上下至心胸肚臍小腹手腳等並遍身上下尸脹臭爛蛆蟲往來咂食不任檢驗如稍可驗即先用水洗去浮蛆蟲仔細依理檢驗五十一闢穢方三神湯能闢死氣蒼朮二兩米泔浸兩宿焙乾白朮半兩甘草半兩炙上為細末每服二錢入鹽少許點服闢穢丹能闢穢氣麝香少許細辛半兩甘松一兩川芎二兩上為細末蜜丸如彈子大久窨為妙每用一丸燒之蘇合香丸每一丸含化尤能辟惡五十二救死方若縊從早至夜雖冷亦可救從夜至早稍難若心下溫一日以上猶可救不得截繩但款款抱解放臥令一人踏其兩肩以手拔其發常令緊一人微微捻整喉嚨依先以手擦胸上散動之一人磨搦臂足屈伸之若已僵但漸漸強屈之又按其腹如此一飯久即氣從口出復呼吸眼開勿苦勞動又以少官桂湯及粥飲與之令潤咽喉更令二人以筆管吹其耳內若依此救無不活者又法緊用手罨其口勿令通氣兩時許氣急即活又用皂角細辛等分為末如大豆許吹兩鼻孔水溺一宿者尚可救搗皂角以綿裹納下部內須臾出水即活又屈死人兩足著人肩上以死人背貼生人背擔走吐出水即活又先打壁泥一堵置地上卻以死者仰臥其上更以壁土覆之止露口眼自然水氣翕入泥間其人遂蘇洪丞相在鄱陽有溺水者身僵氣絶用此法救即蘇又炒熱沙覆死人面上下著沙只留出口耳鼻沙冷濕又換數易即蘇又醋半盞灌鼻中又綿裹石灰納下部中水出即活又倒懸以好酒灌鼻中及下部又倒懸解去衣去臍中垢令兩人以筆管吹其耳又急解死人衣服於臍上灸百壯暍死於行路上旋以刀器掘開一穴入水搗之卻取爛漿以灌死者即活中暍不省人事者與冷水吃即死但且急取灶間微熱灰壅之復以稍熱湯蘸手巾尉腹脅間良久蘇醒不宜便與冷物吃凍死四肢直口噤有微氣者用大鍋炒灰令暖袋盛尉心上冷即換之候目開以溫酒及清粥稍稍與之若不先溫其心便以火炙則冷氣與火爭必死又用氈或藁薦卷之以索系令二人相對踏令袞轉往來如衦古旱切摩展衣也氈法候四肢溫即止魘死不得用燈火照不得近前急喚多殺人但痛咬其足跟及足拇指畔及唾其面必活魘不省者移動些小臥處徐徐喚之即省夜間魘者原有燈即存原無燈切不可用燈照又用筆管吹兩耳及取病人頭髮二七莖捻作繩刺入鼻中又鹽湯灌之又研韭汁半盞灌鼻中冬用根亦得又灸兩足大拇指聚毛中三七壯聚毛乃腳指向上生毛處又皂角末如大豆許吹兩鼻內得嚏則氣通三四日者尚可救中惡客忤卒死凡卒死或先病及睡臥間忽然而絶皆是中惡也用韭黃心於男左女右鼻內刺入六七寸令目間血出即活視上唇內沿有如粟米粒以針挑破又用皂角或生半夏末如大豆許吹入兩鼻又用羊屎燒煙燻鼻中又綿浸好酒半盞手按令汁入鼻中及提其兩手勿令驚須臾即活又灸臍中百壯鼻中吹皂角末或研韭汁灌耳中又用生菖蒲研取汁一盞灌之殺傷凡殺傷不透膜者乳香沒藥各一皂角子大研爛以小便半盞好酒半盞同煎通口溫服然後用花蕊石散或烏賊魚骨或龍骨為末敷瘡口上立止推官宋瑑定驗兩處殺傷氣偶未絶亟令保甲各取蔥白熱鍋炒熟遍敷傷處繼而呻吟再易蔥而傷者無痛矣曾以語樂平知縣鮑旗及再會鮑曰蔥白甚妙樂平人好鬥多傷每有殺傷公事未暇詰問先將蔥白敷傷損處活人甚多大辟為之減少出張聲道經驗方胎動不安凡婦人因爭鬥胎不安腹內氣刺痛脹上喘者川芎一兩半當歸半兩上為細末每服二錢酒一大盞煎六分炒生薑少許在內尤佳又用苧麻根一大把淨洗入生薑三五片水一大盞煎至八分調粥飯與服驚怖死者以溫酒一兩杯灌之即活五絶及墮打卒死等但須心頭溫暖雖經日亦可救先將死人盤屈在地上如僧打坐狀令一人將死人頭髮控放低用生半夏末以竹筒或紙筒筆管吹在鼻內如活卻以生薑自然汁灌之可解半夏毒五絶者産魅縊壓溺治法單方半夏一味卒暴墮攧築倒及鬼魘死若肉未冷急以酒調蘇合香丸灌入口若下喉去可活五十三驗狀說凡驗狀須開具死人尸首原在甚處如何頓放彼處四至有何衣服在彼逐一各檢札名件其尸首有無雕青灸瘢舊有何缺折肢體及傴僂拳跛禿頭青紫黑色紅痣肉瘤蹄踵諸般疾狀皆要一一於驗狀聲載以備證驗詐僞根尋本原推勘及有不得姓名人尸首後有骨肉陳理者便要驗狀證辨觀之今之驗狀若是簡略具述不全致妨久遠照用況驗尸首本緣非理獄囚軍人無主死人則委官定驗兼官司信憑檢驗狀推勘何可疏略又況驗尸失當致罪非輕當是任者切宜究之
