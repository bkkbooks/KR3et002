body:
  text: 卷之一一條令諸屍應驗而不驗初覆同或受差過兩時不發遇夜不計下條准此或不親臨視或不定要害致死之因或定而不當謂以非理死為病死因頭傷為脅傷之類各以違制論即憑驗狀致罪已出入者不在自首覺舉之例其事狀難明定而失當者杖一百吏人行人一等科罪諸被差驗覆非系經隔日久而輒稱屍壞不驗者坐以應驗不驗之罪淳祐詳定諸驗屍報到過兩時不請官者請官違法或受請違法而不言或牒至應受而不受或初覆檢官吏行人相見及漏露所驗事狀者各杖一百若驗訖不當日內申所屬者准此諸縣承他處官司請官驗屍有官可那而稱闕若闕官而不具事因申牒或探伺牒至而託故在假避免者各以違制論諸行人因驗屍受財依公人法諸檢覆之類應差官者差無親嫌干礙之人諸命官所任處有任滿賞者不得差出應副檢驗屍者聽差諸驗屍州差司理參軍本院囚別差官或止有司理一院准此縣差尉縣尉闕即以次差簿丞縣丞不得出本縣界監當官皆闕者縣令前去若過十里或驗本縣囚牒最近縣其郭下縣皆申州應覆驗者並於差初驗官日先次申牒差官應牒最近縣而百里內無縣者聽就近牒巡檢或都巡檢內覆檢應止牒本縣官而獨員者准此並謂非見出巡捕者諸監當官出城驗屍者縣差手力五人當直諸死人未死前無緦麻以上親在死所若禁囚責出十日內及部送者同並差官驗屍人力女使經取口詞者差公人囚及非理致死者仍覆驗驗覆訖即為收瘞仍差人監視親戚收瘞者付之若知有親戚在他所者仍報知諸屍應覆驗者在州申州在縣於受牒時牒屍所最近縣狀牒內各不得具致死之因相去百里以上而遠於本縣者止牒本縣官獨員即牒他縣諸請官驗屍者不得越黃河江湖江河謂無橋梁湖謂水漲不可渡者及牒獨員縣郭下縣聽牒牒至即申州差官前去諸驗屍應牒近縣而牒遠縣者牒至亦受驗畢申所屬諸屍應牒鄰近縣驗覆而合請官在別縣若百里外或在病假不妨本職非無官可那者受牒縣當日具事因在假者具日時保明申本州及提點刑獄司並報元牒官司仍牒以次縣諸初覆檢屍格目提點刑獄司依式印造每副初覆各三紙以千字文為號鑿定給下州縣遇檢驗即以三紙先從州縣填訖付被差官候檢驗訖從實填寫一申州縣一付被害之家無即繳回本司一具日時字號入急遞徑申本司點檢遇有第三次以後檢驗准此諸因病死謂非在囚禁及部送者應驗屍而同居緦麻以上親或異居大功以上親至死所而願免者聽若僧道有法眷童行有本師未死前在死所而寺觀主首保明各無他故者亦免其僧道雖無法眷但有主首或徒眾保明者准此諸命官因病亡謂非在禁及部送者若經責口詞或因卒病而所居處有寺觀主首或店戶及鄰居並地分合幹人保明無他故者官司審察聽免檢驗諸縣令丞簿雖應差出須當留一員在縣非時俱闕州郡差官權諸稱違制論者不以失論刑統制曰謂奉制有所施行而違者徒二年若非故違而失錯旨意者杖一百諸監臨主司受財枉法二十匹無祿者二十五匹絞若罪至流及不枉法贓五十匹配本城諸以毒物自服或與人服而誣告人罪不至死者配千里若服毒人已死而知情誣告人者並許人捕捉賞錢五十貫諸緦麻以上親因病死輒以他故誣人者依誣告法謂言毆死之類致官司信憑以經檢驗者不以廕論仍不在引虛減等之例即緦麻以上親自相誣告及人力女使病死其親輒以他故誣告主家者准此尊長誣告卑幼廕贖減等自依本法諸有詐病及死傷受使檢驗不實者各依所欺減一等若實病死及傷不以實驗者以故入人罪論刑統議曰上條詐疾病者杖一百檢驗不實同詐妄減一等杖九十諸屍雖經驗而系妄指他屍告論致官司信憑推鞠依誣告法即親屬至死所妄認者杖八十被誣人在禁致死者加三等若官司妄勘者依入人罪法刑統疏以他物毆人者杖六十見血為傷非手足者其餘皆為他物即兵不用刃亦是申明刑統以靴鞋踢人傷從官司驗定堅硬即從他物若不堅硬即難作他物例諸保辜者手足毆傷人限十日以他物毆傷人者二十日以刃及湯火傷人者三十日折目折跌肢體及破骨者三五十日限內死者各依殺人論諸齧人者各依他物法辜內墮胎者墮後別保三十日仍通本毆傷限不得過五十日其在限外及雖在限內以他故死者各依本毆傷法他故謂別增余患而死假毆人頭傷風從頭瘡而入因風致死之類仍依殺人論若不因頭瘡得風而死是為他故各依本毆傷法乾道六年八月十六日尚書省此批狀州縣檢驗之官並差文官如有闕官去處覆檢官方差右選本所看詳檢驗之官自合依法差文臣如邊遠小縣委的闕文臣處覆檢官權差識字武臣今聲說照用嘉定十六年二月十八日勅臣僚奏檢驗不定要害致命之因法至嚴矣而檢覆失實則為覺舉遂以苟免欲望睿旨下刑部看詳頒示遵用刑寺長貳詳議檢驗不當覺舉自有見行條法今檢驗不實則乃為覺舉遂以苟免今看詳命官檢驗不實或失當不許用覺舉原免余並依舊法施行奉聖旨依二檢覆總說上凡驗官多是差廳子虞候或以親隨作公人家人各目前去追集鄰人保伍呼為先牌打路排保打草踏路先馳看屍之類皆是搔擾鄉眾此害最深切須戒忌凡檢驗承牒之後不可接見在近官員秀才術人僧道以防奸欺及招詞訴仍未得鑿定日時於牒前到地頭約度程限方可書鑿庶免稽遲仍約束行吏等人不得少離官員恐有乞覓遇夜行吏須要勒令供狀方可止宿凡承牒檢驗須要行凶人隨行差土著有家累田產無過犯節級教頭部押公人看管如到地頭勒令行凶人當面對屍仔細檢喝勒行人公吏對眾鄰保當面供狀不可下司恐有過度走弄之弊如未獲行凶人以鄰保為眾證所有屍帳初覆官不可漏露仍須是躬親詣屍首地頭監行人檢喝免致出脫重傷處凡檢官遇夜宿處須問其家是與不是凶身血屬親戚方可安歇以別嫌疑凡血屬入狀乞免檢多是暗受凶身買和套合公吏入狀檢官切不可信憑便與備申或與繳回格目雖得州縣判下明有公文照應猶須審處恐異時親屬爭錢不平必致生詞或致發覺自亦例被汙穢難明凡行凶器杖索之少緩則奸囚之家藏匿移易妝成疑獄可以免死干係甚重初受差委先當急急收索若早出官又可參照痕傷大小闊狹定驗無差凡到檢所未要自向前且於上風處坐定略喚死人骨屬或地主湖南有地主他處無競主審問事因了點數干係人及鄰保應是合於檢狀著字人齊足先令札下硬四至始同人吏向前看驗若是自縊切要看吊處及項上痕更看系處塵土曾與不曾移動及系吊處高下原踏甚處是甚物上得去系處更看垂下長短項下繩帶大小對痕寬狹細看是活套頭死套頭有單掛十字系有纏繞系各要看詳若是臨高撲死要看失腳處土痕蹤跡高下若是落水淹死亦要看失腳處土痕高下及量水淺深其餘殺傷病患諸般非理死人札四至了但令扛𢱲明淨處且未用湯水酒醋先干檢一遍仔細看腦後頂心頭髮內恐有火燒釘子釘入骨內其血不出亦不見痕損更切點檢眼睛口齒舌鼻大小便二處防有他物然後用溫水洗了先使酒醋蘸紙搭頭面上胸脅兩乳臍腹兩肋間更用衣服蓋罨了澆上酒醋用薦席罨一時久方檢不得信令行人只將酒醋潑過痕損不出也三檢覆總說下凡檢驗不可信憑行人須令將酒醋洗淨仔細檢視如燒死口內有灰溺死腹脹內有水以衣物或濕紙搭口鼻上死即腹干脹若被人勒死項下繩索交過手指甲或抓損若自縊即腦後分八字索子不交繩在喉下舌出喉上舌不出切在詳細自余傷損致命即無可疑如有疑慮即且捉賊捉賊不獲猶是公過若被人打殺卻作病死後如獲賊不免深譴凡檢驗文字不得作皮破血出大凡皮破即血出當云皮微損有血出凡定致命痕雖小當微廣其分寸定致命痕內骨折即聲說骨不折不須言骨不折卻重害也或行凶器杖未到不可分毫增減恐他日索到異同凡傷處多只指定一痕系要害致命凡聚眾打人最難定致命痕如死人身上有兩痕皆可致命此兩痕若是一人下手則無害若是兩人則一人償命一人不償命須是兩痕內斟酌得最重者為致命凡官守戒訪外事惟檢驗一事若有大段疑難須更廣布耳目以合之庶幾無誤如斗毆限內身死痕損不明若有病色曾使醫人師巫救治之類即多因病患死若不訪問則不知也雖廣布耳目不可任一人仍在善使之不然適足自誤凡行凶人不得受他通吐一例收人解送待他到縣通吐後卻勾追恐手腳下人妄生事搔擾也凡初覆檢訖血屬耆正副鄰人並責狀看守屍首切不可混同解官徒使被擾但解凶身干證若獄司要人自會追呼凡檢覆後體訪得行凶事因不可見之公文者面白長官使知曲折庶易勘鞠近年諸路憲司行下每於初覆檢官內就差一員兼體究凡體究者必須先喚集鄰保反覆審問如歸一則合款供或見聞參差則令各供一款或並責行凶人供吐大略一併繳申本縣及憲司縣獄憑此審勘憲司憑此詳覆或小有差互皆受重責簿尉既無刑禁鄰里多已驚奔若憑吏卒開口即是私意須是多方體訪務令參會歸一切不可憑一二人口說便以為信及備三兩紙供狀謂可塞責況其中不識字者多出吏人代書其鄰證內或又與凶身是親故及暗受買囑符合者不可不察隨行人吏及合幹人多賣弄四鄰先期縱其走避只捉遠鄰或老人婦人及未成丁人塞責或不得已而用之只可參互審問終難憑以為實全在斟酌又有行凶人恐要切干證人真直供有所妨礙故令藏匿自以親密人或地客佃客出官合套誣證不可不知頑囚多不伏于格目內凶身下填寫姓名押字公吏有所取受反教令別撰名色寫作被誣或干連之類欲乘此走弄出入近江西宋提刑重定格目申之朝省添入被執人一項若虛實未定者不得已與之就下書填其確然是實者須勒令僉押於正行凶字下不可姑息詭隨全在檢驗官自立定見四疑難雜說上凡驗屍不過刀刃殺傷與他物鬥打拳手毆擊或自縊或勒殺或投水或被人溺殺或病患數者致命而已然有勒殺類乎自縊溺死類乎投水鬥毆有在限內致命而實因病患身死人力女使因被捶撻在主家自害自縊之類理有萬端併為疑難臨時審察切勿輕易差之毫釐失之千里凡檢驗疑難屍首如刃物所傷透過者須看內外瘡口大處為行刃處小處為透過處如屍首爛須看其原衣服比傷著去處屍或覆臥其右手有短刃物及竹頭之類自喉至臍下者恐是酒醉攛倒自壓自傷如近有登高處或泥須看身上有無財物有無損動處恐因取物失腳自傷之類檢婦人無傷損處須看陰門恐有自此入刀於腹內離皮淺則臍上下微有血沁深則無多是單獨人求食婦人如男子須看頂心恐有平頭釘糞門恐有硬物自此入多是同行人因丈夫年老婦人年少之類也凡屍在身無痕損唯面色有青黯或一邊似腫多是被人以物搭口鼻及罨捂殺或是用手巾布袋之類絞殺不見痕更看頂項上肉硬即是切要者看手足有無擊縛痕舌上恐有嚼破痕大小便二處恐有踏腫痕若無此類方看口內有無涎唾喉間腫與不腫如有涎及腫恐患纏喉風死宜詳若究得行凶人當來有窺謀事蹟分明又已招伏方可檢出若無影跡即恐是酒醉卒死多有人相鬥毆了各自分散散後或有去近江河池塘邊洗頭面上血或取水吃卻為方相打了尚困乏或因醉相打後頭旋落水淹死落水時尚活其屍腹肚膨脹十指甲內有沙泥兩手向前驗得只是落水淹死分明其屍上有毆擊痕損更不可定作致命去處但一一札上驗狀只定作落水致命最捷緣打傷雖在要害處尚有辜限在法雖在辜限內及限外以他故死者各依本毆傷法注他故謂別增余患而死者今既是落水身死則雖有痕傷其實是以他故致死分明曾有驗官為見頭上傷損卻定作因打傷迷悶不覺倒在水內卻將打傷處作致命致招罪人翻異不絕更有相打散乘高撲下卓死亦然但驗失腳處高下撲損痕瘢致命要害處仍鬚根究曾見相打分散證佐人凡驗因爭鬥致死雖二主分明而屍上並無痕損何以定要害致命處此必是被傷人舊有宿患氣疾或是未爭鬥以前先曾飲酒至醉至爭鬥時有所觸犯致氣絕而死也如此者多是腎子或一個或兩個縮上不見須用溫醋湯蘸衣服或綿絮之類罨一飯久令仵作行人以手按小腹下其腎子自下即其驗也然後仔細看要害致命處昔有甲乙同行乙有隨身衣物而甲欲謀取之甲呼乙行路至溪河欲渡中流甲執乙就水而死是無痕也何以驗之先驗其屍瘦劣大小十指甲各黑黯色指甲及鼻孔內各有沙泥胸前赤色口唇青斑腹肚脹此乃乙劣而為甲之所執於水而致死也當究甲之原情須有贓證以觀此驗萬無失一又有年老人以手捂之而氣亦絕是無痕而死也有一鄉民令外甥並鄰人子將鋤頭同開山種粟經再宿不歸及往觀焉乃二人俱死在山遂聞官隨身衣服並在牒官驗屍驗官到地頭見一屍在小茅舍外後項骨斷頭面各有刃傷痕一屍在茅舍內左項下右腦後各有刃傷痕在外者眾曰先被傷而死在內者眾曰後自刃而死官司但以各有傷別無財物定兩相併殺一驗官獨曰不然若以情度情作兩相併殺而死可矣其舍內者右腦後刃痕可疑豈有自用刃於腦後者手不便也不數日間乃緝得一人挾仇並殺兩人縣案明遂聞州正極典不然二冤永無歸矣大凡相併殺余痕無疑即可為檢驗貴在精專不可失誤
